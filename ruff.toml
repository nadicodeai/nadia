# Ruff config for argo.
#
# Pre-existing F401 / F541 errors were inherited from agent worktrees under
# .claude/worktrees/ (FleetView's per-agent isolated copies) where each
# agent's snapshot of tests/test_run_assertions.py and tools/build.py shows
# up as a duplicate finding. The real errors are fixed at the source paths;
# the worktree copies are excluded so they don't multiply the count.
#
# .ruff_cache/ and upstream/ are also excluded — upstream is pristine code
# (not argo's responsibility per AGENTS.md "upstream/ is pristine"), and
# .ruff_cache/ is a build artifact.

extend-exclude = [
    ".claude/",
    ".ruff_cache/",
    "upstream/",
    ".sync-workdir/",
    "dist/",
]
