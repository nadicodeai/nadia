name: nadia
version: 1.0.0
description: "Dashboard auth provider — OAuth 2.0 (authorization-code + PKCE) against Nadia Agents Portal. Auto-activates when a client_id is configured via either dashboard.oauth.client_id in config.yaml (canonical surface) or NADIA_DASHBOARD_OAUTH_CLIENT_ID env var (operator override; Portal injects this at Fly.io provisioning). dashboard.oauth.portal_url / NADIA_DASHBOARD_PORTAL_URL are optional and default to https://portal.nadicode.ai."
author: NadicodeAI
kind: backend
requires_env:
  - NADIA_DASHBOARD_OAUTH_CLIENT_ID
