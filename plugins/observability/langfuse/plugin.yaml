name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Nadia — traces conversations, LLM calls, and tool usage. Opt-in via `nadia plugins enable observability/langfuse` or `nadia tools → Langfuse Observability`."
author: NadicodeAI
requires_env:
  - NADIA_LANGFUSE_PUBLIC_KEY
  - NADIA_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
