  # Cluster 2 — URL skip_contexts preserves hermes-substring (1 entry)
  # The test asserts equality against a string literal URL whose path
  # segment contains the upstream-named topic `hermes-in`. argo-rename.yaml's
  # URL skip_contexts pattern preserves URL substrings verbatim per repo
  # policy (URLs are upstream-owned: docs sites, PyPI, badge labels, etc.,
  # are NousResearch property and must not be rewritten). The runtime under
  # test correctly builds `https://ntfy.example.com/argo-in` from the
  # renamed topic config value (`topic: "argo-in"` everywhere in the
  # fixture). Only the literal assertion string diverges. M4's regex
  # tightening (negated class now stops at quote/backslash) makes embedded
  # KEY=value tails after URLs renamable — but URL-internal tokens like
  # this one stay protected, as designed.
  # ---------------------------------------------------------------
  - nodeid: tests/gateway/test_ntfy_plugin.py::TestStandaloneSend::test_posts_to_server
    reason: "Test asserts on hermes-named ntfy topic in a URL path ('https://ntfy.example.com/hermes-in'). argo-rename.yaml's URL skip_contexts preserves URL substrings verbatim per repo policy (URLs are upstream-owned); the runtime correctly builds 'argo-in' from the renamed topic. Test diverges intentionally — XFAIL until upstream parametrizes the topic name or argo's rebrand engine grows URL-internal token rewriting (separate scope)."
    category: X

