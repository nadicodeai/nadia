[pytest]
# Top-level pytest config for the nadia repo. Tests under tests/ and
# overlay/tests/ both run from here.
#
# Markers must be registered to silence PytestUnknownMarkWarning.

# testpaths excludes overlay/tests/ because most of its tests reference
# nadia_* identifiers that only exist post-rename (they ship into
# dist/nadia/tests/ and run inside the built image / against dist/nadia/).
# overlay/tests/test_sync_fixture.py is the exception — it works
# pre-rename via subprocess. Invoke it explicitly:
#   pytest overlay/tests/test_sync_fixture.py -m integration
testpaths = tests

markers =
    integration: marks tests requiring external services or slow fixtures (sync-fixture-200 extraction, real upstream, etc.); skipped by default
    real_concurrent_gate: opt out of the autouse stub that disables concurrent-instance detection (inherited convention from upstream)
    slow: marks tests that take >30s (e.g. Docker-driven install-smoke harness); runs by default but bypasses the default 30s timeout via subprocess-level timeouts

# Skip integration tests by default. Run them explicitly:
#   pytest -m integration
# Mirrors upstream's `[tool.pytest.ini_options].addopts` convention.
addopts = -m 'not integration' --timeout=30 --timeout-method=signal
