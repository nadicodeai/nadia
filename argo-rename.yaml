# argo-rename.yaml — declarative rename + exception config for argo-sync.
#
# Mappings are applied longest-from-first so that longer tokens shadow
# shorter overlapping ones (e.g. "hermes_agent" is handled before "hermes").
# The engine also re-sorts on load, so the order here is for human review.

mappings:
  # --- URL-form mapping (longest first; must precede bare hermes-agent) ---
  # GitHub URLs for the upstream Hermes repo map to this fork's GitHub repo.
  # The new repo is nadicodeai/argo (not nadicodeai/argo-agent — the legacy
  # in-tree-rename repo). nadicode does not own nousresearch.com, so no
  # docs/pypi domains are rewritten.
  - {from: "NousResearch/hermes-agent", to: "nadicodeai/argo"}
  # --- Composite identifiers (longest first) ---
  - {from: "hermes_tools_mcp_server", to: "argo_tools_mcp_server"}
  - {from: "HermesAgent",             to: "ArgoAgent"}
  - {from: "Hermes-Agent",            to: "Argo-Agent"}
  - {from: "hermes-agent",            to: "argo-agent"}
  - {from: "hermes_agent",            to: "argo_agent"}
  - {from: "hermes_bootstrap",        to: "argo_bootstrap"}
  - {from: "hermes_constants",        to: "argo_constants"}
  - {from: "hermes_logging",          to: "argo_logging"}
  - {from: "hermes_state",            to: "argo_state"}
  - {from: "hermes_time",             to: "argo_time"}
  - {from: "hermes_cli",              to: "argo_cli"}
  - {from: "HERMES_HOME",             to: "ARGO_HOME"}
  - {from: "HERMES_",                 to: "ARGO_"}
  - {from: "~/.hermes",              to: "~/.argo"}
  - {from: ".hermes/",               to: ".argo/"}
  # --- Bare case variants (shortest, last) ---
  - {from: "Hermes",                  to: "Argo"}
  - {from: "HERMES",                  to: "ARGO"}
  - {from: "hermes",                  to: "argo"}

exceptions:
  # Dropped in M2.1 audit (legacy-repo paths absent from new-repo dist/argo/ layout):
  # - .shepherd/** (lives at repo root; engine never sees it — it only runs on dist/argo/)
  # - argo-rename.yaml (lives at repo root; same reason)
  # - bin/argo-bootstrap.py (no bootstrap script in the dist artifact)
  # - .gitleaks.toml (absent from upstream; will be re-added via a patch + re-listed if needed)
  # Re-added in #4 follow-up (the rename engine doesn't see them, but the
  # runtime `argo doctor --static` does because they exist inside the published image):
  # - *.egg-info/** (generated by `pip install -e .` inside the Docker runtime stage)
  - path: ".argo/**"
    why: "Build/sync manifests record the pre-rename file paths (hermes_cli/foo.py → argo_cli/foo.py). They are intentionally metadata about the rename and ship with the artifact for introspection (argo --version --verbose surfaces them)."
  - path: "*.egg-info/**"
    why: "setuptools-generated metadata produced by `pip install -e .` inside the runtime Docker stage (issue #4 surfaced this). PKG-INFO embeds README.md / README.zh-CN.md verbatim, which are themselves excepted (fork-notice block, attribution badges, upstream docs links — MIT attribution requirement, no nadicode-hosted docs site). The egg-info is regenerated on every install and is never tracked in source. Excluding it here keeps `argo doctor --static` exit-zero clean for runtime users."
  - path: ".gitleaks.toml"
    why: "Fork-owned overlay file. Allowlist regex deliberately matches historical hermes_cli/* paths (pre-rename) so gitleaks ignores files present in git history that no longer exist in HEAD. Naming those paths is required for the allowlist to work — the rename engine MUST NOT collapse `hermes_cli` here."
  - path: "tests/test_full_rename_config.py"
    why: "This test validates the rename config by checking that hermes-* FROM keys are present in mappings. It must contain hermes-* string literals and cannot be renamed by the engine itself."
  - path: "*/_rename_defaults.py"
    why: "Build-time generated constants module (tools/generate_rename_defaults.py) baking argo-rename.yaml's mappings + exceptions + skip_contexts into a Python module so `argo doctor --static` works in the published image where the yaml is absent (issue #4). The file legitimately contains every hermes-* FROM key as a string literal — it is the rename config in Python form — so the engine MUST NOT rewrite its contents. The single-level `*/_rename_defaults.py` glob matches both the pre-rename overlay path (hermes_cli/_rename_defaults.py) and the post-rename dist path (argo_cli/_rename_defaults.py)."
  - path: "README.md"
    why: "Fork-notice block, attribution badges, and docs links intentionally reference upstream (NousResearch/hermes-agent, hermes-agent.nousresearch.com). MIT license requires attribution and there is no Nadicode-hosted docs site."
  - path: "README.zh-CN.md"
    why: "Same fork-notice and attribution requirements as README.md, translated."
  - path: "CONTRIBUTING.md"
    why: "Points contributors at upstream docs site (hermes-agent.nousresearch.com) which is where the documentation actually lives."
  - path: "AGENTS.md"
    why: "References upstream's hermes-example-plugins repo for plugin samples; no nadicode fork of that repo exists."
  - path: "argo-already-has-routines.md"
    why: "Planning/comparison document that references upstream docs URLs for context."
  - path: ".github/workflows/skills-index.yml"
    why: "Fork-specific gate comments name hermes-agent.nousresearch.com when explaining why the upstream docs deploy is disabled."
  - path: ".github/workflows/deploy-site.yml"
    why: "Same fork-specific gate comments as skills-index.yml."
  - path: "website/docs/developer-guide/plugin-llm-access.md"
    why: "References upstream's hermes-example-plugins repo (sample plugins live in the upstream companion repo; no nadicode fork exists)."
  - path: "website/docs/user-guide/features/extending-the-dashboard.md"
    why: "Same as plugin-llm-access.md — references hermes-example-plugins for dashboard reskin examples."

skip_contexts:
  # Preserve every URL whose host/path is NOT something nadicode controls.
  # We only rewrite GitHub URLs for the upstream hermes-agent repo (handled by
  # the NousResearch/hermes-agent → nadicodeai/argo mapping above) and
  # the hermes-agent.local devhost. Everything else — hermes-agent.nousresearch.com
  # (real upstream docs site, owned by NousResearch), pypi.org/p/hermes-agent
  # (real upstream PyPI package), img.shields.io/badge/Docs-hermes (badge label
  # that should mirror upstream), and NousResearch/hermes-example-plugins
  # (no nadicode fork exists) — is preserved as-is.
  - 'https?://(?!(?:(?:raw\.)?github(?:usercontent)?\.com/NousResearch/hermes-agent\b|hermes-agent\.local))[^\s]*'
  - '\b[0-9a-f]{40}\b'      # Don't rewrite inside git-sha-like 40-hex tokens.
  - '\b[0-9a-f]{64}\b'      # Don't rewrite inside sha256-like 64-hex tokens.
