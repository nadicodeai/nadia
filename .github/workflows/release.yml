name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  source-and-installers:
    name: source archive and install scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stage source archive and install scripts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          git archive --format=tar.gz --prefix="nadia-${GITHUB_REF_NAME}/"             -o "release-assets/nadia-${GITHUB_REF_NAME}-source.tar.gz" HEAD
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          cp scripts/install.cmd release-assets/install.cmd
          find release-assets -maxdepth 1 -type f -print | sort

      - uses: actions/upload-artifact@v4
        with:
          name: source-and-installers
          path: release-assets/*
          if-no-files-found: error

  desktop-macos:
    name: desktop macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app artifacts
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name:-}" ]; then
              unset "${name}"
            fi
          done
          npm run dist:mac --workspace apps/desktop

      - name: Validate macOS Gatekeeper acceptance
        shell: bash
        run: |
          set -euo pipefail

          dmg="$(find apps/desktop/release -maxdepth 1 -type f -name 'Nadia-Agent-*.dmg' | sort | tail -n 1)"
          zip="$(find apps/desktop/release -maxdepth 1 -type f -name 'Nadia-Agent-*.zip' | sort | tail -n 1)"
          test -n "${dmg}"
          test -n "${zip}"

          mount="${RUNNER_TEMP}/nadia-dmg"
          installed="${RUNNER_TEMP}/Nadia Agent.app"
          zip_root="${RUNNER_TEMP}/nadia-zip"
          rm -rf "${mount}" "${installed}" "${zip_root}"
          mkdir -p "${mount}" "${zip_root}"

          cleanup() {
            hdiutil detach "${mount}" >/dev/null 2>&1 || true
            rm -rf "${installed}" "${zip_root}"
          }
          trap cleanup EXIT

          hdiutil attach "${dmg}" -readonly -nobrowse -mountpoint "${mount}"
          dmg_app="${mount}/Nadia Agent.app"
          test -d "${dmg_app}"
          codesign --verify --deep --strict --verbose=2 "${dmg_app}"
          codesign -dv --verbose=4 "${dmg_app}" 2>&1 | sed -n '1,80p'

          if [ -n "${CSC_LINK:-}" ] && [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            xcrun stapler validate "${dmg_app}"
            spctl --assess --type execute --verbose=4 "${dmg_app}"
          fi

          ditto "${dmg_app}" "${installed}"
          xattr -w com.apple.quarantine "0081;$(printf '%x' "$(date +%s)");GitHubActions;https://github.com/nadicodeai/nadia/releases" "${installed}"
          codesign --verify --deep --strict --verbose=2 "${installed}"
          launch_regex="${installed}/Contents/MacOS/Nadia Agent|AppTranslocation.*/Nadia Agent.app/Contents/MacOS/Nadia Agent"
          open -n "${installed}" &
          open_pid="$!"
          pids=""
          for _ in $(seq 1 40); do
            pids="$(pgrep -f "${launch_regex}" || true)"
            if [ -n "${pids}" ]; then
              break
            fi
            if ! kill -0 "${open_pid}" >/dev/null 2>&1; then
              wait "${open_pid}" || true
            fi
            sleep 1
          done
          if kill -0 "${open_pid}" >/dev/null 2>&1; then
            kill "${open_pid}" >/dev/null 2>&1 || true
            wait "${open_pid}" || true
          fi
          if [ -z "${pids}" ]; then
            echo "macOS app did not launch from a quarantined copy; refusing to publish the DMG." >&2
            pgrep -fl "CoreServicesUIAgent|Nadia Agent" || true
            exit 1
          fi
          kill ${pids} >/dev/null 2>&1 || true

          ditto -x -k "${zip}" "${zip_root}"
          zip_app="${zip_root}/Nadia Agent.app"
          test -d "${zip_app}"
          codesign --verify --deep --strict --verbose=2 "${zip_app}"
          if [ -n "${CSC_LINK:-}" ] && [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            xcrun stapler validate "${zip_app}"
            spctl --assess --type execute --verbose=4 "${zip_app}"
          fi

      - name: Product gate (macOS)
        shell: bash
        run: |
          set -euo pipefail

          dmg="$(find apps/desktop/release -maxdepth 1 -type f -name 'Nadia-Agent-*.dmg' | sort | tail -n 1)"
          test -n "${dmg}"

          mount="${RUNNER_TEMP}/nadia-gate-dmg"
          rm -rf "${mount}"
          mkdir -p "${mount}"
          cleanup() { hdiutil detach "${mount}" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          hdiutil attach "${dmg}" -readonly -nobrowse -mountpoint "${mount}"
          gate_app="${mount}/Nadia Agent.app"
          test -d "${gate_app}"

          # portal check: real first-run bootstrap + sign-in click; activation-start
          # proven on the packaged macOS app 2026-07-06 (issue #14 was click-during-
          # bootstrap sequencing, fixed by the gate's settle-wait).
          node apps/desktop/scripts/product-gate.mjs --binary "${gate_app}/Contents/MacOS/Nadia Agent" --checks render,brand,portal --pristine

      - name: Stage macOS app artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find apps/desktop/release -maxdepth 1 -type f \( -name 'Nadia-Agent-*.dmg' -o -name 'Nadia-Agent-*.zip' \) -exec cp {} release-assets/ \;
          test -n "$(find release-assets -maxdepth 1 -type f -print -quit)"
          find release-assets -maxdepth 1 -type f -print | sort

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: release-assets/*
          if-no-files-found: error

  desktop-windows:
    name: desktop Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app artifacts
        run: npm run dist:win --workspace apps/desktop

      - name: Product gate (Windows)
        shell: pwsh
        run: |
          $unpacked = 'apps/desktop/release/win-unpacked'
          $exe = Join-Path $unpacked 'Nadia Agent.exe'
          if (-not (Test-Path -LiteralPath $exe)) {
            $found = Get-ChildItem -LiteralPath $unpacked -Filter '*.exe' -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notlike '*Uninstall*' } |
              Select-Object -First 1
            if (-not $found) { throw "No unpacked Windows executable found under $unpacked to gate." }
            $exe = $found.FullName
          }
          # TODO(#14): portal check proven on macOS 2026-07-06; enable here after one observed run on this OS
          node apps/desktop/scripts/product-gate.mjs --binary "$exe" --checks render,brand --pristine
          if ($LASTEXITCODE -ne 0) { throw "product gate failed (exit $LASTEXITCODE)" }

      - name: Stage Windows app artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $files = Get-ChildItem apps/desktop/release -File |
            Where-Object { $_.Name -like 'Nadia-Agent-*.exe' -or $_.Name -like 'Nadia-Agent-*.msi' }
          if (-not $files) { throw 'No Windows app artifacts were produced.' }
          $files | Copy-Item -Destination release-assets
          Get-ChildItem release-assets -File | Sort-Object Name | ForEach-Object { $_.FullName }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: release-assets/*
          if-no-files-found: error

  desktop-linux:
    name: desktop Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm xvfb

      - name: Install dependencies
        run: npm ci

      - name: Build Linux app artifacts
        run: npm run dist:linux --workspace apps/desktop

      - name: Product gate (Linux)
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail

          appimage="$(find apps/desktop/release -maxdepth 1 -type f -name 'Nadia-Agent-*.AppImage' | sort | tail -n 1)"
          test -n "${appimage}"
          chmod +x "${appimage}"

          # TODO(#14): portal check proven on macOS 2026-07-06; enable here after one observed run on this OS
          xvfb-run -a node apps/desktop/scripts/product-gate.mjs --binary "${appimage}" --checks render,brand --pristine

      - name: Stage Linux app artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find apps/desktop/release -maxdepth 1 -type f \( -name 'Nadia-Agent-*.AppImage' -o -name 'Nadia-Agent-*.deb' -o -name 'Nadia-Agent-*.rpm' \) -exec cp {} release-assets/ \;
          test -n "$(find release-assets -maxdepth 1 -type f -print -quit)"
          find release-assets -maxdepth 1 -type f -print | sort

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: publish release assets
    needs:
      - source-and-installers
      - desktop-macos
      - desktop-windows
      - desktop-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Add checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          shasum -a 256 * > sha256sums.txt
          cat sha256sums.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "Nadia Agent ${tag}" --notes "Nadia Agent ${tag}"
          fi
          gh release upload "${tag}" release-assets/* --clobber
