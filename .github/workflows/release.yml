# nadia — release publisher (IU-FR-3, IU-FR-9, IU-AC-12, IU-AC-14, M4.2).
#
# Trigger.
#   Push of a CalVer tag matching `v20*` (e.g. `v2026.5.28`,
#   `v2026.5.28.2`). Tags are cut by the workshop-side wrapper
#   `tools/nadia_release.py` (M4.3a), which ALSO creates the GitHub
#   Release object via `gh release create <tag>` BEFORE pushing the tag.
#   That ordering is load-bearing for the upload step below.
#
# Coordination with `tools/nadia_release.py` (per plan.md § M4.2).
#   The release object already exists by the time this workflow fires
#   (the workshop wrapper called `gh release create` before pushing the
#   tag). Calling `gh release create` again here would 422 with
#   "release already exists". This workflow therefore ONLY uploads
#   assets via `gh release upload --clobber`. If you ever change
#   `tools/nadia_release.py` to defer release creation to CI, flip the
#   final step to `gh release create` and remove this note.
#
# Pipeline.
#   1. prepare-release-tree: checkout, setup, make build,
#      make leakage-static, apply the release bump, build the deterministic
#      source tarball, and upload the exact dist/nadia tree for native desktop
#      packaging jobs.
#   2. desktop-macos: package the Nadia Agent DMG from that tree.
#   3. desktop-windows: package the Nadia Agent NSIS EXE from that tree.
#   4. publish: force-with-lease push dist/nadia/ to origin/release
#      (IU-FR-3 / IU-AC-3), compute sha256 sums for every release asset, and
#      upload tarball + install scripts + DMG + EXE to the pre-existing GitHub
#      Release object.
#
# Concurrency.
#   standards.md mandates a serialized release group so two tag pushes
#   racing do not produce inconsistent release-branch state. We do NOT
#   cancel-in-progress because each tag push is its own artifact run —
#   killing one mid-push would leave dist/nadia/ partially mirrored.
#
# Permissions.
#   `contents: write` because we both (a) `git push` to refs/heads/release
#   via release_branch_push.py and (b) upload release assets via
#   `gh release upload`. The default GITHUB_TOKEN with that scope suffices.
#
# Explicitly NOT doing here (IU-FR-13).
#   No PyPI publish. nadia is shipped as a tarball + install scripts on
#   the release object and as a force-pushed `release` branch tree;
#   PyPI is forbidden by spec until IU-FR-13 is reversed.

name: release

on:
  push:
    tags:
      - 'v20*'

# Single shared lock per standards.md "Force-push to release". Two tag
# pushes racing the orphan-branch force-push would otherwise corrupt the
# release branch state. cancel-in-progress: false because the asset
# upload + branch push IS the deliverable.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  # NOTE: do NOT add `workflows: write` here — it is NOT a valid GITHUB_TOKEN
  # permission key (it fails workflow-file schema validation), and the
  # underlying `workflow` OAuth scope CANNOT be granted to the Actions
  # GITHUB_TOKEN at all. GitHub therefore forbids this token from creating or
  # updating files under `.github/workflows/` on any push. The release tree
  # used to carry upstream's renamed `.github/workflows/`, so the first release
  # after a sync that added/changed a workflow file (build-windows-installer.yml,
  # new in subtree pull 6c9482e8) failed the force-push with: "refusing to allow
  # a GitHub App to create or update workflow ... without `workflows` permission".
  # FIX: tools/release_branch_push.py now strips `.github/workflows/` from the
  # storefront tree entirely (customers don't need our CI, and it avoids those
  # workflows spuriously running on `release`), so this token never touches a
  # workflow file. See _strip_release_workflows() there.

jobs:
  prepare-release-tree:
    name: prepare release tree (build + leakage + tarball)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so the SOURCE_DATE_EPOCH fallback can read
          # `git log -1 --format=%ct` against the full history; the
          # tag-only shallow clone would lose ancestors.
          fetch-depth: 0

      - uses: ./.github/actions/nadia-setup
        with:
          python-version: "3.13"
          # quilt + zstd come for free from the composite default; pyyaml
          # is needed by tools/verify_no_leakage.py during make
          # leakage-static.
          pip-packages: "pyyaml"

      - name: make build
        # Fail fast on rename-engine errors. dist/nadia/ is the input to
        # every downstream step.
        run: |
          . .venv/bin/activate
          make build

      - name: make leakage-static (IU-AC-14 gate)
        # IU-AC-14: no hermes string leaks into the release tree. Any
        # finding here aborts the release before the tarball or branch
        # push runs.
        run: |
          . .venv/bin/activate
          make leakage-static

      - name: Apply release bump to dist/nadia (mirror nadia_release.py)
        # The local workshop run of tools/nadia_release.py already wrote
        # the bumped __version__ + __release_date__ into the local
        # dist/nadia/ before tagging — but the CI rebuild above produces
        # a pristine dist/nadia/ that still carries upstream's values.
        # IU-NFR-3 byte-equivalence between the local tarball and the
        # release-branch tree requires CI to apply the same bump. The
        # values are recovered from the GitHub Release title set by
        # nadia_release.py ("Nadia Agent vX.Y.Z (YYYY.M.D)") because
        # actions/checkout@v4 fetches tags as lightweight refs on the
        # runner (the annotated-tag subject is unavailable via
        # `git tag -l --format=%(contents:subject)` in CI).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          . .venv/bin/activate
          RELEASE_TITLE=$(gh release view "${GITHUB_REF_NAME}" --json name --jq .name)
          echo "release title: ${RELEASE_TITLE}"
          # Title shape: "Nadia Agent v0.14.1 (2026.5.28)"
          VERSION=$(echo "${RELEASE_TITLE}" | sed -nE 's/^Nadia Agent v([0-9]+\.[0-9]+\.[0-9]+) \(([0-9]{4}\.[0-9]+\.[0-9]+(\.[0-9]+)?)\)$/\1/p')
          RELEASE_DATE=$(echo "${RELEASE_TITLE}" | sed -nE 's/^Nadia Agent v([0-9]+\.[0-9]+\.[0-9]+) \(([0-9]{4}\.[0-9]+\.[0-9]+(\.[0-9]+)?)\)$/\2/p')
          if [ -z "${VERSION}" ] || [ -z "${RELEASE_DATE}" ]; then
            echo "could not parse version/release_date from release title: ${RELEASE_TITLE}" >&2
            exit 1
          fi
          python tools/apply_release_bump.py --version "${VERSION}" --release-date "${RELEASE_DATE}"
          grep -E '__version__|__release_date__' dist/nadia/nadia_cli/__init__.py | head -2

      - name: Build deterministic release tarball (IU-NFR-3 / AC-8)
        # IU-NFR-3 ("release tarball deterministic"): two builds on the
        # same SHA + SOURCE_DATE_EPOCH MUST produce byte-identical
        # tarballs. The flags below match foundation AC-8 standards.
        #
        # SOURCE_DATE_EPOCH derivation:
        #   - First try `git -C dist/nadia log -1 --format=%ct` — this
        #     intentionally fails because dist/nadia/ is not a git repo
        #     (it is gitignored on main). The fallback is the repo-root
        #     `git log -1 --format=%ct`, which gives the tag-commit
        #     timestamp. Either way SOURCE_DATE_EPOCH ends up pinned to
        #     a content-derived integer.
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH=$(git -C dist/nadia log -1 --format=%ct 2>/dev/null || git log -1 --format=%ct)
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
          tar --mtime=@${SOURCE_DATE_EPOCH} --sort=name --owner=0 --group=0 --numeric-owner \
            -czf "nadia-${GITHUB_REF_NAME}.tar.gz" -C dist/nadia .
          ls -l "nadia-${GITHUB_REF_NAME}.tar.gz"

      - name: Stage base release assets
        # The final publish job adds desktop DMG/EXE artifacts and computes one
        # sha256sums.txt over the flat asset directory. install.ps1 is
        # presence-gated because an air-gapped/Linux-only rename-engine config
        # could legitimately produce a Linux-only release tree.
        run: |
          set -euo pipefail
          mkdir -p release-base-assets
          cp "nadia-${GITHUB_REF_NAME}.tar.gz" release-base-assets/
          cp dist/nadia/scripts/install.sh release-base-assets/
          if [ -f "dist/nadia/scripts/install.ps1" ]; then
            cp dist/nadia/scripts/install.ps1 release-base-assets/
          fi
          find release-base-assets -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Pack dist/nadia for native desktop jobs
        run: |
          set -euo pipefail
          tar -cf dist-nadia-worktree.tar -C dist/nadia .

      - name: Upload dist/nadia worktree
        uses: actions/upload-artifact@v4
        with:
          name: dist-nadia-worktree
          path: dist-nadia-worktree.tar
          if-no-files-found: error
          retention-days: 1

      - name: Upload base release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-base-assets
          path: release-base-assets/*
          if-no-files-found: error
          retention-days: 1

  desktop-macos:
    name: desktop macOS DMG
    needs: prepare-release-tree
    runs-on: macos-latest
    steps:
      - name: Download dist/nadia worktree
        uses: actions/download-artifact@v4
        with:
          name: dist-nadia-worktree

      - name: Extract dist/nadia worktree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/nadia
          tar -xf dist-nadia-worktree.tar -C dist/nadia

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dist/nadia/package-lock.json

      - name: Install npm dependencies
        working-directory: dist/nadia
        run: npm ci

      - name: Build Nadia Agent DMG
        working-directory: dist/nadia/apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac:dmg

      - name: Collect DMG asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop-macos-assets
          find dist/nadia/apps/desktop/release -maxdepth 1 -type f -name 'Nadia-Agent-*.dmg' -exec cp {} desktop-macos-assets/ \;
          test -n "$(find desktop-macos-assets -maxdepth 1 -type f -name 'Nadia-Agent-*.dmg' -print -quit)"
          find desktop-macos-assets -maxdepth 1 -type f -print | sort

      - name: Upload DMG asset
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-assets
          path: desktop-macos-assets/*
          if-no-files-found: error
          retention-days: 1

  desktop-windows:
    name: desktop Windows EXE
    needs: prepare-release-tree
    runs-on: windows-latest
    steps:
      - name: Download dist/nadia worktree
        uses: actions/download-artifact@v4
        with:
          name: dist-nadia-worktree

      - name: Extract dist/nadia worktree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/nadia
          tar -xf dist-nadia-worktree.tar -C dist/nadia

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dist/nadia/package-lock.json

      - name: Install npm dependencies
        working-directory: dist/nadia
        run: npm ci

      - name: Build Nadia Agent Windows installer
        working-directory: dist/nadia/apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win:nsis

      - name: Collect EXE asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop-windows-assets
          find dist/nadia/apps/desktop/release -maxdepth 1 -type f -name 'Nadia-Agent-*.exe' -exec cp {} desktop-windows-assets/ \;
          test -n "$(find desktop-windows-assets -maxdepth 1 -type f -name 'Nadia-Agent-*.exe' -print -quit)"
          find desktop-windows-assets -maxdepth 1 -type f -print | sort

      - name: Upload EXE asset
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-assets
          path: desktop-windows-assets/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish release (branch push + asset upload)
    needs:
      - prepare-release-tree
      - desktop-macos
      - desktop-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist/nadia worktree
        uses: actions/download-artifact@v4
        with:
          name: dist-nadia-worktree

      - name: Extract dist/nadia worktree
        run: |
          set -euo pipefail
          mkdir -p dist/nadia
          tar -xf dist-nadia-worktree.tar -C dist/nadia

      - name: Download base release assets
        uses: actions/download-artifact@v4
        with:
          name: release-base-assets
          path: release-assets

      - name: Download macOS desktop assets
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos-assets
          path: release-assets

      - name: Download Windows desktop assets
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-assets
          path: release-assets

      - name: Force-push dist/nadia/ to origin/release (IU-FR-3)
        # The release branch is the customer-facing storefront tree.
        # release_branch_push.py uses --force-with-lease (never --force)
        # and injects identity via `git -c user.*` flags so it never
        # mutates the runner's global config.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 tools/release_branch_push.py \
            --dist-root dist/nadia \
            --remote-url "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            --branch release \
            --source-sha "${GITHUB_SHA}"

      - name: Compute sha256 sums
        # Hash by BASENAME, not by path. Release assets are uploaded flat
        # (install.sh, install.ps1, nadia-*.tar.gz, Nadia-Agent-*.dmg, and
        # Nadia-Agent-*.exe live side-by-side in the download dir), so the
        # manifest must read e.g. `install.sh`, not `release-assets/install.sh`.
        run: |
          set -euo pipefail
          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name sha256sums.txt -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum
          ) > release-assets/sha256sums.txt
          cat release-assets/sha256sums.txt

      - name: Upload assets to the existing release (M4.3a coordination)
        # tools/nadia_release.py (M4.3a) already created the release
        # object via `gh release create` BEFORE pushing the tag that
        # triggered this workflow. Calling `gh release create` here
        # would 422. `gh release upload --clobber` is idempotent:
        # safe to re-run, overwrites previously uploaded assets with
        # the same name.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(find release-assets -maxdepth 1 -type f | sort)
          gh release upload "${GITHUB_REF_NAME}" "${ASSETS[@]}" --clobber
