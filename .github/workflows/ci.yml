# argo — per-PR / per-push CI gate (spec AC-9, FR-15)
#
# Runs on every pull_request and every push to main. Declares the eight
# jobs required by spec AC-9:
#
#   1. lint                  — ruff check (PLW1514 only, upstream convention)
#   2. typecheck             — ty check overlay/ tools/  (pre-build source)
#   3. build                 — make build; uploads dist/argo/.argo/build-manifest.json
#   4. leakage               — needs: build; make leakage-static (FR-12)
#   5. test                  — pytest tests/ (build-tool tests; integration skipped)
#   6. upstream-pristine     — make check-upstream-pristine (FR-15 / C3 gate)
#   7. parity                — make parity (FR-16 CLI surfaces, M6.2a real gate)
#   8. check-legacy-untouched — DECLARED but skipped in CI (legacy repo not present)
#
# Tool versions are pinned to spec § Tech Stack:
#   Python  3.13 (type-check target)
#   ruff    0.15.10
#   ty      0.0.21
#   pytest  9.0.2 / pytest-asyncio 1.3.0 / pytest-timeout 2.4.0
#
# Branch protection on `main` MUST be configured manually in the GitHub UI
# to require these jobs. The workflow only DECLARES them; GitHub enforces.
# Required checks should include: lint, typecheck, build, leakage, test,
# upstream-pristine, parity. (`check-legacy-untouched` is skipped in CI by
# design — see job comment.)

name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (PR head or branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default. Jobs that need more tighten on a per-job basis.
permissions:
  contents: read

env:
  # Spec § Tech Stack — pinned versions. Keep in sync with upstream
  # pyproject.toml [project.optional-dependencies].dev.
  PYTHON_VERSION: "3.13"
  RUFF_VERSION: "0.15.10"
  TY_VERSION: "0.0.21"
  PYTEST_VERSION: "9.0.2"
  PYTEST_ASYNCIO_VERSION: "1.3.0"
  PYTEST_TIMEOUT_VERSION: "2.4.0"

jobs:
  # ---------------------------------------------------------------------------
  # 1. lint — ruff check (PLW1514 only, per upstream)
  # ---------------------------------------------------------------------------
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install "ruff==${RUFF_VERSION}"
      - name: ruff check
        run: |
          . .venv/bin/activate
          ruff check .

  # ---------------------------------------------------------------------------
  # 2. typecheck — ty check against PRE-BUILD source (overlay/ + tools/)
  #    Not dist/ — that doesn't exist on a fresh checkout, and the engine
  #    is authored under hermes-named paths anyway.
  # ---------------------------------------------------------------------------
  typecheck:
    name: typecheck (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install ty + pyyaml (tools/ imports it)
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install "ty==${TY_VERSION}" pyyaml
      - name: ty check
        run: |
          . .venv/bin/activate
          ty check overlay/ tools/

  # ---------------------------------------------------------------------------
  # 3. build — `make build` produces dist/argo/ and runs FR-14 assertions.
  #    Uploads the build manifest as a workflow artifact for downstream
  #    inspection (parity / image jobs in later phases can consume it).
  # ---------------------------------------------------------------------------
  build:
    name: build (make build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install system deps (quilt for patch series, zstd for fixture tarballs)
        run: |
          sudo apt-get update
          sudo apt-get install -y quilt zstd
      - name: Install Python build deps (pyyaml for tools/, rename engine)
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install pyyaml
      - name: make build
        run: |
          . .venv/bin/activate
          make build
      - name: Upload build manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: dist/argo/.argo/build-manifest.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 4. leakage — depends on build; re-runs make build then make leakage-static.
  #    dist/argo/ is NOT shared between GH Actions jobs (only the manifest
  #    artifact is small enough to be worth uploading); re-running build is
  #    cheap and ensures the scan operates on a real tree, not a stale upload.
  # ---------------------------------------------------------------------------
  leakage:
    name: leakage (static scan)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install system deps (quilt + zstd for build pipeline)
        run: |
          sudo apt-get update
          sudo apt-get install -y quilt zstd
      - name: Install Python deps
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install pyyaml
      - name: make build (recreate dist/argo/ for the scan)
        run: |
          . .venv/bin/activate
          make build
      - name: make leakage-static
        run: |
          . .venv/bin/activate
          make leakage-static

  # ---------------------------------------------------------------------------
  # 5. test — pytest tests/ (build-tool tests; integration marker skipped by
  #    pytest.ini default `-m 'not integration'`). Then runs the AC-8
  #    determinism integration test explicitly so the gate is actually
  #    enforced in CI (pytest.ini's default would otherwise deselect it).
  #
  #    quilt + zstd are required because the AC-8 step shells out to
  #    `make build` twice; the build-tool default-marker tests don't need
  #    them, but installing once for the whole job is simpler than splitting.
  # ---------------------------------------------------------------------------
  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install system deps (quilt + zstd for AC-8 determinism build)
        run: |
          sudo apt-get update
          sudo apt-get install -y quilt zstd
      - name: Install pytest + pyyaml
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install \
            "pytest==${PYTEST_VERSION}" \
            "pytest-asyncio==${PYTEST_ASYNCIO_VERSION}" \
            "pytest-timeout==${PYTEST_TIMEOUT_VERSION}" \
            pyyaml
      - name: pytest (default markers — integration skipped)
        run: |
          . .venv/bin/activate
          pytest tests/
      - name: pytest -m integration tests/test_dist_determinism.py (AC-8 gate)
        # Spec AC-8 / NFR-4: dist/argo/ MUST be bit-identical across two
        # builds at the same SHA with SOURCE_DATE_EPOCH set. The test is
        # `@pytest.mark.integration` so the default `tests/` run above
        # skips it; we run it explicitly here so AC-8 is a real CI gate
        # (not just a local-only check). ~60-90s for two make build runs.
        run: |
          . .venv/bin/activate
          pytest -m integration tests/test_dist_determinism.py

  # ---------------------------------------------------------------------------
  # 6. upstream-pristine — FR-15 / C3. Verifies upstream/ matches the last
  #    sync (or bootstrap) commit's tree. fetch-depth: 0 is REQUIRED so
  #    tools/check_upstream_pristine.py can walk `git log -- upstream/`.
  #    Does NOT depend on build — fast fail.
  # ---------------------------------------------------------------------------
  upstream-pristine:
    name: upstream-pristine (FR-15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: make check-upstream-pristine
        run: make check-upstream-pristine

  # ---------------------------------------------------------------------------
  # 7. parity — FR-16 customer-parity gate (M6 closed: all 7 surfaces).
  #
  #    Runs `make parity` which drives `tools/parity_runner.py` against
  #    the locally-built `:dev` image and the locally-pulled legacy
  #    `:latest` image across all 7 FR-16 surfaces.
  #
  #    `make parity` invokes the runner with `--allow-expected`, which
  #    reclassifies surfaces listed in tests/parity-expected.yml as
  #    XFAIL (expected failure, non-blocking). The whitelist documents
  #    the v0.8.0-vs-v0.14.0 baseline-version gap — three surfaces
  #    (help, version, session-init) FAIL purely because legacy :latest
  #    is older than the spec-named :0.14.0 tag (which was never
  #    published). Anything failing that is NOT on the whitelist is a
  #    real regression and blocks the merge.
  #
  #    Lifecycle: once a real v0.14.0 legacy image lands (M7 first real
  #    sync), DROP entries from tests/parity-expected.yml that no longer
  #    FAIL and re-tighten the gate. See AGENTS.md § Parity baseline.
  # ---------------------------------------------------------------------------
  parity:
    name: parity (FR-16 all surfaces, XFAIL-aware)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install system deps (quilt + zstd for `make image`)
        run: |
          sudo apt-get update
          sudo apt-get install -y quilt zstd
      - name: Install Python deps (pyyaml for build pipeline + runner YAML)
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install pyyaml
      - name: docker pull legacy baseline
        # :0.14.0 is published by .github/workflows/publish-legacy-baseline.yml
        # (one-shot, workflow_dispatch). Until that workflow has run
        # successfully this pull will 404 and parity CI will fail loudly.
        # That is the intended signal — see issue #1 and AGENTS.md
        # § Parity baseline.
        run: docker pull ghcr.io/nadicodeai/argo-agent:0.14.0
      - name: make image (build :dev locally)
        run: |
          . .venv/bin/activate
          make image
      - name: make parity (XFAIL-aware; strict-against-regressions)
        run: |
          . .venv/bin/activate
          make parity

  # ---------------------------------------------------------------------------
  # 8. check-legacy-untouched — DECLARED but SKIPPED in CI.
  #
  #    Spec AC-10 ("legacy repo at ~/Code/argo-agent untouched") is a
  #    LOCAL-DEV gate. The legacy repo isn't present on GitHub-hosted
  #    runners (it lives only on the maintainer's machine, frozen at
  #    9b8cf6bf5). The verification path is hashing-at-session-start-
  #    and-end on the maintainer's workstation, not in CI.
  #
  #    Job is declared here so the AC-9 list is visually complete; the
  #    `if: false` guard ensures GH Actions never schedules it. If we
  #    ever decide to host a baseline-hash artifact in the repo for CI
  #    cross-check, flip this on and wire it up.
  # ---------------------------------------------------------------------------
  check-legacy-untouched:
    name: check-legacy-untouched (local-dev gate; skipped in CI)
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: make check-legacy-untouched
        run: make check-legacy-untouched
