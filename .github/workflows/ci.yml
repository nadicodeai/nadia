# argo — per-PR / per-push CI gate (spec AC-9, FR-15)
#
# Runs on every pull_request and every push to main. Declares the jobs that
# verify argo is hermes-agent renamed:
#
#    1. lint                            — ruff check (PLW1514 only, upstream convention)
#    2. typecheck                       — ty check overlay/ tools/  (pre-build source)
#    3. build                           — make build; uploads dist/argo/.argo/build-manifest.json
#    4. leakage                         — needs: build; make leakage-static (FR-12)
#    5. test                            — pytest tests/ (build-tool tests; integration skipped)
#    6. upstream-pristine               — make check-upstream-pristine (FR-15 / C3 gate)
#    7. install-smoke                   — Docker-driven install.sh smoke (IU-AC-4/5/9)
#    8. update-smoke                    — Docker-driven update flow (IU-AC-9/10/11)
#    9. dist-argo-tests                 — 6-slice matrix over dist/argo/tests/ (UCS-AC-5/6)
#   10. dist-argo-tests-save-durations  — companion to 9, main-only durations cache write
#
# Tool versions are pinned to spec § Tech Stack:
#   Python  3.13 (type-check target)
#   ruff    0.15.10
#   ty      0.0.21
#   pytest  9.0.2 / pytest-asyncio 1.3.0 / pytest-timeout 2.4.0
#
# Branch protection on `main` MUST be configured manually in the GitHub UI
# to require these jobs. The workflow only DECLARES them; GitHub enforces.
# Required checks should include: lint, typecheck, build, leakage, test,
# upstream-pristine. install-smoke, update-smoke, and dist-argo-tests
# are visible-but-non-blocking pending promotion follow-ups.

name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (PR head or branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default. Jobs that need more tighten on a per-job basis.
permissions:
  contents: read

env:
  # Spec § Tech Stack — pinned versions. Keep in sync with upstream
  # pyproject.toml [project.optional-dependencies].dev.
  PYTHON_VERSION: "3.13"
  RUFF_VERSION: "0.15.10"
  TY_VERSION: "0.0.21"
  PYTEST_VERSION: "9.0.2"
  PYTEST_ASYNCIO_VERSION: "1.3.0"
  PYTEST_TIMEOUT_VERSION: "2.4.0"

jobs:
  # ---------------------------------------------------------------------------
  # 1. lint — ruff check (PLW1514 only, per upstream)
  # ---------------------------------------------------------------------------
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/argo-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          apt-packages: ""
          pip-packages: "ruff==${{ env.RUFF_VERSION }}"
      - name: ruff check
        run: |
          . .venv/bin/activate
          ruff check .

  # ---------------------------------------------------------------------------
  # 2. typecheck — ty check against PRE-BUILD source (overlay/ + tools/)
  #    Not dist/ — that doesn't exist on a fresh checkout, and the engine
  #    is authored under hermes-named paths anyway.
  # ---------------------------------------------------------------------------
  typecheck:
    name: typecheck (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/argo-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          apt-packages: ""
          pip-packages: "ty==${{ env.TY_VERSION }} pyyaml"
      - name: ty check
        run: |
          . .venv/bin/activate
          ty check overlay/ tools/

  # ---------------------------------------------------------------------------
  # 3. build — `make build` produces dist/argo/ and runs FR-14 assertions.
  #    Uploads the build manifest as a workflow artifact for downstream
  #    inspection (parity / image jobs in later phases can consume it).
  # ---------------------------------------------------------------------------
  build:
    name: build (make build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/argo-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          pip-packages: "pyyaml"
      - name: make build
        run: |
          . .venv/bin/activate
          make build
      - name: Upload build manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: dist/argo/.argo/build-manifest.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 4. leakage — depends on build; re-runs make build then make leakage-static.
  #    dist/argo/ is NOT shared between GH Actions jobs (only the manifest
  #    artifact is small enough to be worth uploading); re-running build is
  #    cheap and ensures the scan operates on a real tree, not a stale upload.
  # ---------------------------------------------------------------------------
  leakage:
    name: leakage (static scan)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/argo-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          pip-packages: "pyyaml"
      - name: make build (recreate dist/argo/ for the scan)
        run: |
          . .venv/bin/activate
          make build
      - name: make leakage-static
        run: |
          . .venv/bin/activate
          make leakage-static

  # ---------------------------------------------------------------------------
  # 5. test — pytest tests/ (build-tool tests; integration marker skipped by
  #    pytest.ini default `-m 'not integration'`). Then runs the AC-8
  #    determinism integration test explicitly so the gate is actually
  #    enforced in CI (pytest.ini's default would otherwise deselect it).
  #
  #    quilt + zstd are required because the AC-8 step shells out to
  #    `make build` twice; the build-tool default-marker tests don't need
  #    them, but installing once for the whole job is simpler than splitting.
  # ---------------------------------------------------------------------------
  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/argo-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          pip-packages: "pytest==${{ env.PYTEST_VERSION }} pytest-asyncio==${{ env.PYTEST_ASYNCIO_VERSION }} pytest-timeout==${{ env.PYTEST_TIMEOUT_VERSION }} pyyaml"
      - name: pytest (default markers — integration skipped)
        run: |
          . .venv/bin/activate
          pytest tests/
      - name: pytest -m integration tests/test_dist_determinism.py (AC-8 gate)
        # Spec AC-8 / NFR-4: dist/argo/ MUST be bit-identical across two
        # builds at the same SHA with SOURCE_DATE_EPOCH set. The test is
        # `@pytest.mark.integration` so the default `tests/` run above
        # skips it; we run it explicitly here so AC-8 is a real CI gate
        # (not just a local-only check). ~60-90s for two make build runs.
        run: |
          . .venv/bin/activate
          pytest -m integration tests/test_dist_determinism.py

  # ---------------------------------------------------------------------------
  # 6. upstream-pristine — FR-15 / C3. Verifies upstream/ matches the last
  #    sync (or bootstrap) commit's tree. fetch-depth: 0 is REQUIRED so
  #    tools/check_upstream_pristine.py can walk `git log -- upstream/`.
  #    Does NOT depend on build — fast fail.
  # ---------------------------------------------------------------------------
  upstream-pristine:
    name: upstream-pristine (FR-15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/argo-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          apt-packages: ""
      - name: make check-upstream-pristine
        run: make check-upstream-pristine

  # ---------------------------------------------------------------------------
  # 7. install-smoke — M5.2 Docker-driven install.sh smoke harness.
  #
  #    Pulls the renamed install.sh from the live `release` branch and runs
  #    it in a clean ubuntu:22.04 container, asserting five invariants:
  #      1. ~/.argo/.install_method == "git"                    (IU-AC-5)
  #      2. `argo --version` exits 0                            (IU-AC-4 exit)
  #      3. banner matches hermes regex                         (IU-AC-4 banner)
  #      4. `argo update --check` does NOT print fork warning   (IU-AC-9 static)
  #      5. ~/.hermes/.install_method does not exist            (leakage)
  #
  #    NOT a required check yet — branch protection wiring is a follow-up.
  #    Visible-but-non-blocking on PRs so regressions surface loudly without
  #    gating merges before M5/M6 close.
  # ---------------------------------------------------------------------------
  install-smoke:
    name: install-smoke (M5.2; IU-AC-4/5/9)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: bash tests/install_smoke/run.sh
        run: bash tests/install_smoke/run.sh

  # ---------------------------------------------------------------------------
  # 9. update-smoke — IU-AC-9 (full), IU-AC-10, IU-AC-11 (M5.3 Part A).
  #
  #    Boots ubuntu:22.04, installs argo from the public `release` branch,
  #    asserts the three update-related ACs that don't require a live
  #    Telegram. Public artefacts only — no GHCR secrets needed.
  #
  #    NOT a required check (visible only). 15-minute timeout caps the
  #    job; the actual harness budget is < 5 minutes per spec IU-AC-15.
  # ---------------------------------------------------------------------------
  update-smoke:
    name: update-smoke (M5.3 Part A — IU-AC-9/10/11)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: make update-smoke
        run: make update-smoke

  # ---------------------------------------------------------------------------
  # 10. dist-argo-tests — run upstream's renamed unit test suite against
  #     dist/argo/ (UCS-AC-5, UCS-AC-6).
  #
  #     Wires the ~26k renamed upstream unit tests (in dist/argo/tests/) into
  #     CI so every push and PR exercises the rebrand product, not just the
  #     ~7 CLI surfaces parity covers. Mirrors upstream's tests.yml shape:
  #     6-slice matrix, fail-fast: false, durations-cache balancing, Python
  #     3.11 inside the dist-internal venv (wheel-resolution parity with
  #     upstream's own CI). argo's other jobs above continue on Python 3.13.
  #
  #     Visible-but-non-blocking initially. Promotion to a required check on
  #     `main` is a deliberate follow-up after a green streak (per
  #     .shepherd/update-cycle-smoke/standards.md § Boundaries → Ask first).
  #
  #     Caches:
  #       - argo-uv-cache-*       : ~/.cache/uv HTTP cache, keyed on the
  #                                 upstream/pyproject.toml + argo-rename.yaml
  #                                 content hash. Stable proxy for
  #                                 dist/argo/pyproject.toml (which doesn't
  #                                 exist until after `make build`).
  #       - argo-test-durations   : per-file wall-clock cache used by
  #                                 scripts/run_tests_parallel.py's --slice
  #                                 to balance shards. Restored per shard,
  #                                 merged + saved on main by the companion
  #                                 dist-argo-tests-save-durations job.
  #
  #     Names start with `argo-` to namespace cleanly from any future caches.
  # ---------------------------------------------------------------------------
  dist-argo-tests:
    name: dist-argo-tests (slice ${{ matrix.slice }}/6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        slice: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/argo-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # `pyyaml` so `tools/build.py` can run (same pattern as the
          # `build` job above). The dist-internal `.venv-test` is a
          # separate uv-managed Python 3.11 venv created below.
          pip-packages: "pyyaml"

      - name: Restore uv HTTP cache
        # The dist `[all,dev]` install pulls a large optional-backend
        # surface (anthropic, telegram, whisper, edge-tts, modal,
        # daytona, …). Caching ~/.cache/uv across runs keeps the
        # per-shard install time within budget. Key is tied to the
        # upstream pyproject + the rebrand config — both are stable
        # proxies for dist/argo/pyproject.toml (which doesn't exist
        # until after `make build` so we can't hashFiles() it here).
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: argo-uv-cache-${{ runner.os }}-${{ hashFiles('upstream/pyproject.toml', 'argo-rename.yaml') }}
          restore-keys: |
            argo-uv-cache-${{ runner.os }}-

      - name: Restore test-durations cache
        # Mirror of the durations-cache restore step in upstream's
        # tests.yml workflow (the "Restore test durations" actions/cache
        # step). We restore to a temp path because `make build` blows
        # away dist/argo/; we copy the restored file into
        # dist/argo/test_durations.json AFTER the build so the runner
        # can find it. Restore-only here; the companion save-durations
        # job below writes the cache on main.
        id: durations-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/argo-test-durations.json
          key: argo-test-durations

      - name: make build
        run: |
          . .venv/bin/activate
          make build

      - name: Seed dist/argo/test_durations.json from cache (if any)
        # `scripts/run_tests_parallel.py` reads test_durations.json from
        # the repo root, which is dist/argo/ for the renamed runner.
        # Copy in the restored cache so --slice gets balanced slicing.
        run: |
          if [ -f /tmp/argo-test-durations.json ]; then
            cp /tmp/argo-test-durations.json dist/argo/test_durations.json
            echo "Seeded dist/argo/test_durations.json from cache."
          else
            echo "No durations cache hit; first run will distribute by count."
          fi

      - name: Provision dist-internal .venv-test (Python 3.11 + [all,dev])
        # Python 3.11 to match upstream tests.yml (wheel-resolution
        # parity with upstream's own CI). argo's other jobs run on
        # Python 3.13; this dist venv is the only 3.11 surface.
        run: |
          cd dist/argo
          uv venv .venv-test --python 3.11
          uv pip install --python .venv-test/bin/python -e ".[all,dev]"

      - name: Run dist/argo tests (slice ${{ matrix.slice }}/6)
        # Upstream's own runner (rebrand-renamed) — UCS-AC-6 forbids
        # introducing a new runner. Per-file isolation, LPT-balanced
        # slicing by cached durations.
        env:
          # Belt-and-braces: ensure tests don't accidentally hit real
          # APIs even if env leaks in from the runner image. Mirrors
          # upstream tests.yml.
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
        run: |
          cd dist/argo
          .venv-test/bin/python scripts/run_tests_parallel.py --slice ${{ matrix.slice }}/6

      - name: Upload per-slice durations
        # Each shard writes its own (partial) test_durations.json. The
        # companion save-durations job merges them on main.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: argo-test-durations-slice-${{ matrix.slice }}
          path: dist/argo/test_durations.json
          if-no-files-found: warn
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 11. dist-argo-tests-save-durations — merge per-slice durations and save
  #     to cache. Gated to main so PRs only READ the cache (preventing
  #     forks from poisoning it). Mirrors upstream's save-durations job.
  # ---------------------------------------------------------------------------
  dist-argo-tests-save-durations:
    name: dist-argo-tests-save-durations (main only)
    needs: dist-argo-tests
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download all slice durations
        uses: actions/download-artifact@v4
        with:
          pattern: argo-test-durations-slice-*
          path: durations
          merge-multiple: true

      - name: Merge per-slice duration data
        run: |
          python3 -c "
          import json, glob
          merged = {}
          for f in glob.glob('durations/*test_durations.json'):
            with open(f) as fh:
              merged.update(json.load(fh))
          with open('test_durations.json', 'w') as fh:
            json.dump(merged, fh, indent=2, sort_keys=True)
          print(f'Merged {len(merged)} file durations')
          "

      - name: Save merged durations cache
        uses: actions/cache/save@v4
        with:
          path: test_durations.json
          key: argo-test-durations

