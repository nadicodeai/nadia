# argo — weekly upstream sync (spec FR-8, OQ-3)
#
# Purpose.
#   Pulls upstream hermes-agent, re-applies our quilt patch series, runs
#   `make build` as verification, and opens a PR for human review. The
#   maintainer reviews the sync commit (diff in upstream/ + any refreshed
#   patches), waits for ci.yml to go green on the PR, then merges.
#
# Cadence.
#   Mondays at 06:00 UTC (cron '0 6 * * 1'). Weekly is the spec OQ-3
#   decision: daily is too noisy (most weeks produce no upstream delta),
#   monthly lags security fixes (spec § Risks: 7-day SLA on upstream
#   security propagation). `workflow_dispatch` is always available for
#   manual / emergency syncs (e.g. a CVE landing mid-week).
#
# Failure modes.
#   - `make sync` succeeds AND produces a commit -> push branch, open PR.
#   - `make sync` succeeds AND tree is unchanged (upstream already at our
#     pin) -> no-op, no PR, no issue. Detected via `git diff main...HEAD`
#     being empty before the push step.
#   - `make sync` fails (typically quilt conflict per FR-9) -> open a
#     GitHub Issue tagged with the date; maintainer resolves manually via
#     the FR-9 procedure (`.sync-workdir/` + `make sync-resume`) and then
#     triggers `workflow_dispatch` once unblocked.
#
# Token scope.
#   The push + commit step uses the default `GITHUB_TOKEN`. The `gh pr
#   create` step uses `secrets.SYNC_BOT_TOKEN` (a fine-grained PAT) so the
#   resulting PR is opened by the PAT identity — which is REQUIRED for
#   downstream `pull_request` workflows (i.e. ci.yml) to fire on the PR
#   (issue #6; GitHub Actions intentionally suppresses `pull_request`
#   events from PRs opened by `GITHUB_TOKEN` to prevent recursion).
#   The failure-issue step still uses `GITHUB_TOKEN` since it does not
#   need to trigger downstream workflows. See AGENTS.md § Sync bot token
#   setup for how to provision the PAT.
#   The bot identity `argo-sync-bot <noreply@nadicodeai.com>` is
#   configured inline; nothing else to provision out-of-band.
#
# Branch protection.
#   Branch protection on `main` SHOULD NOT block this workflow's PRs from
#   being merged after review — the bot goes through the same PR review
#   flow as a human contributor. The bot never pushes directly to `main`;
#   it pushes to `argo/sync-YYYYMMDD` and opens a PR against `main`.
#
# How to disable temporarily.
#   Set `if: false` on the `sync` job below (or comment out the `schedule`
#   trigger). Re-enable by reverting.

name: sync

on:
  schedule:
    # Mondays 06:00 UTC. Spec OQ-3.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Never cancel a sync in progress — `git subtree pull` + `quilt push -a`
# + `make build` is non-trivial work and an interrupted run can leave
# `.sync-workdir/` in a half-applied state on the runner. Queue instead.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    name: weekly upstream sync
    runs-on: ubuntu-latest
    permissions:
      contents: write           # commit the sync on a fresh branch
      pull-requests: write      # open the sync PR
      issues: write             # open a failure issue on conflict
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/argo-setup
        with:
          pip-packages: "pyyaml"

      - name: Configure git identity
        run: |
          git config user.name "argo-sync-bot"
          git config user.email "noreply@nadicodeai.com"

      - name: Create sync branch
        id: branch
        run: |
          BRANCH="argo/sync-$(date -u +%Y%m%d)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run make sync
        id: sync
        run: |
          . .venv/bin/activate
          make sync
        continue-on-error: true

      # No-op detection: if make sync succeeded but didn't change the tree
      # relative to main (upstream already at our pin), skip PR creation.
      # `git diff --quiet` exits 0 when there's no diff, 1 when there is.
      - name: Detect no-op sync
        id: changed
        if: steps.sync.outcome == 'success'
        run: |
          if git diff --quiet origin/main...HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream delta — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Guard: SYNC_BOT_TOKEN must be configured before we try to open a PR.
      # Without it the `gh pr create` step would fail opaquely; this step
      # turns the failure into a single clear error pointing at AGENTS.md.
      # See issue #6 + AGENTS.md § Sync bot token setup.
      - name: Verify sync bot token
        if: steps.sync.outcome == 'success' && steps.changed.outputs.changed == 'true'
        env:
          SYNC_BOT_TOKEN: ${{ secrets.SYNC_BOT_TOKEN }}
        run: |
          if [ -z "${SYNC_BOT_TOKEN}" ]; then
            echo "::error::secrets.SYNC_BOT_TOKEN is not set. See AGENTS.md § Sync bot token setup."
            exit 1
          fi

      - name: Push branch
        if: steps.sync.outcome == 'success' && steps.changed.outputs.changed == 'true'
        run: |
          git push -u origin "${{ steps.branch.outputs.branch }}"

      # `gh pr create` MUST use the PAT (SYNC_BOT_TOKEN), not GITHUB_TOKEN.
      # Reason: PRs opened by GITHUB_TOKEN do NOT fire downstream
      # `pull_request` workflows (anti-recursion behavior), so ci.yml would
      # never run on the weekly sync PR. With the PAT, the PR is authored
      # by that identity and ci.yml triggers normally. Issue #6.
      - name: Open PR
        if: steps.sync.outcome == 'success' && steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_BOT_TOKEN }}
        run: |
          gh pr create --base main --head "${{ steps.branch.outputs.branch }}" \
            --title "sync: upstream weekly (auto-generated)" \
            --body "Weekly automated upstream sync. Triggered by .github/workflows/sync.yml. Review the sync commit, run CI, merge if green."

      - name: Open failure issue
        if: steps.sync.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "sync: weekly upstream sync failed ($(date -u +%Y-%m-%d))" \
            --body "Weekly sync via .github/workflows/sync.yml failed. Check the workflow run log for the failing patch / conflicting hunks. Resolve via the FR-9 procedure (manual conflict resolution + make sync-resume) or trigger workflow_dispatch after fixing the patch."
