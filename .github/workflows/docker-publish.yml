# argo — Docker image publish to ghcr.io/nadicodeai/argo (spec FR-7, M5.2).
#
# Triggers.
#   - push to main          -> two variants pushed; moves :latest/:slim      (linux/amd64)
#   - release.published     -> two variants pushed; moves :latest/:slim      (linux/amd64 + linux/arm64)
#   - workflow_dispatch     -> two variants pushed; immutable :<sha> only    (linux/amd64)
#
# Image variants (issue #2 — NFR-3 resolution; see AGENTS.md § Image variants).
#   runtime-slim   ~371 MB   CLI-only; matches FR-16 surfaces 1-7.
#   runtime-full   ~4.5 GB   Adds node/npm + ffmpeg + playwright/chromium +
#                            s6-overlay so TUI, voice, browser-tool, and
#                            dashboard surfaces work — matches legacy v0.14.0.
#
# Tag-decision tree.
#   Full variant (customer default — what `docker pull ghcr.io/nadicodeai/argo`
#                                    without a tag resolves to):
#     :dev                  Local builds only; never pushed by this workflow.
#     :<git-sha-short>      Every push that runs this workflow.
#     :latest               main pushes AND release.published events.
#     :v<X.Y.Z>             Only on a `vX.Y.Z` git tag (release.published).
#
#   Slim variant (CLI-only deployments — opt-in):
#     :<git-sha-short>-slim Every push that runs this workflow.
#     :slim                 main pushes AND release.published events
#                           (= "latest slim"; the customer-facing pointer).
#     :latest-slim          Alias for :slim; published alongside for callers
#                           that follow the `<variant>-<channel>` convention.
#     :v<X.Y.Z>-slim        Only on a `vX.Y.Z` git tag (release.published).
#
# Auth.
#   Uses the workflow's GITHUB_TOKEN (packages:write below). No external
#   secret is required for ghcr push under the repo's own namespace
#   (nadicodeai/argo). Spec OQ-13's "GHCR_TOKEN PAT" is the LOCAL
#   maintainer path, not the CI path — CI uses GITHUB_TOKEN which is
#   provisioned per-run with minimal scope.
#
# Multi-arch (OQ-4, issue #8).
#   Release tags get a multi-arch manifest (linux/amd64 + linux/arm64) so
#   Apple Silicon and ARM cloud (Graviton, Ampere) users can `docker pull`
#   without architecture flags. Push-to-main + workflow_dispatch builds
#   stay linux/amd64 only: QEMU emulation adds ~10 min per build on
#   GitHub-hosted runners and we don't want that cost on every commit.
#
#   The two paths differ structurally because `docker buildx build` cannot
#   `--load` a multi-platform manifest list into the local Docker daemon
#   (that's a daemon limitation, not a buildx one). So:
#     - single-arch path: builds + pushes each variant in turn via buildx
#       --push (no local --load needed; we're not exec'ing inside the
#       image, only pushing).
#     - multi-arch path: identical structure — a single buildx build per
#       variant writes the manifest list straight to ghcr with --push.
#
#   Both paths converge on `docker buildx build --push --target <stage>`.
#   The historical `make image` + `scripts/publish.sh` flow is preserved
#   for local maintainer use; CI no longer routes through it because the
#   slim/full split adds a second source tag that doesn't fit
#   publish.sh's single-source-tag contract.
#
# Race condition note (release.published vs push to main).
#   When `gh release create` against a tag on main fires both `push` and
#   `release.published`, both target :latest. concurrency.group below
#   serializes them; the release job wins by ordering (release.published
#   re-tags :latest to the release commit, which is identical to main's
#   HEAD anyway). The push side is idempotent.

name: docker-publish

on:
  push:
    branches: [main]
  # PR gate (no push): build BOTH variants so an image-breaking change is
  # caught BEFORE it merges to main — not after. Historically docker-publish
  # ran only post-merge, so a sync could go green on the PR (ci.yml) and still
  # break the image on main (e.g. a new transitive npm dep like node-pty that
  # node-gyp must compile, needing make/g++). Paths-gated to image-affecting
  # files so unrelated PRs don't pay the ~10-15 min build. The build steps below
  # skip --push on pull_request, so nothing is published from a PR.
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'upstream/**'
      - 'patches/**'
      - 'overlay/**'
      - 'packaging-overrides.yaml'
      - 'argo-rename.yaml'
      - '.github/workflows/docker-publish.yml'
      - '.github/actions/argo-setup/**'
  release:
    types: [published]
  workflow_dispatch:

# Serialize PUBLISH jobs (push/release) so concurrent main pushes + release
# events don't race the :latest re-tag — cancel-in-progress: false because each
# published image IS the artifact. PR builds publish nothing, so they get a
# per-ref group that DOES cancel superseded runs (a new push to the PR makes the
# in-flight build obsolete).
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('docker-publish-pr-{0}', github.ref) || 'docker-publish' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  image-and-publish:
    name: build + push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so we can compute :<sha-short> and detect a
          # vX.Y.Z tag pointing at HEAD.
          fetch-depth: 0

      - name: Install system deps (quilt + zstd for make build inside builder stage)
        # Buildx isolates the builder stage's apt installs, but make/quilt
        # may also be invoked by tooling outside the Dockerfile in future
        # phases (e.g. running `make build` on the runner to seed a cache).
        # Keeping the install here means callers of `make image` always
        # have a viable host even when buildx is unused.
        uses: ./.github/actions/argo-setup
        with:
          with-uv: "false"
          python-version: ""

      # QEMU registers binfmt_misc handlers so the runner (amd64) can
      # execute arm64 binaries during the build. Only matters on the
      # multi-arch release path, but the action is a no-op-cheap (~2 s)
      # when only the host arch is requested, so we run it unconditionally
      # to keep the step list simple.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # No login on PRs: they don't push (and fork PRs lack package creds anyway).
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Decide build platforms. Multi-arch only on release.published; every
      # other trigger stays amd64 for build-time speed.
      - name: Compute build platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.action }}" = "published" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "multiarch=true" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "multiarch=false" >> "$GITHUB_OUTPUT"
          fi

      # Compute tag sets for both variants. Slim tags carry the -slim
      # suffix; full tags are the "bare" pointers (:latest, :<sha>,
      # :v<X.Y.Z>). On release.published the release tag is added to
      # both variants. main pushes additionally tag :slim + :latest.
      - name: Compute tags
        id: tags
        # github.event.release.tag_name is attacker-influenceable release
        # payload. Bind it through env: so the runner never substitutes the
        # raw value into shell text (command-injection hardening); the script
        # only ever reads the quoted "$RELEASE_TAG". For non-release events
        # github.event.release.tag_name expands to the empty string, which is
        # exactly the desired "no release tag" sentinel.
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          REPO="ghcr.io/nadicodeai/argo"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          if [ "${{ github.event_name }}" != "release" ]; then
            RELEASE_TAG=""
          fi

          # Slim variant tags. The customer-facing "latest slim" pointer
          # is :slim (matches Debian's :slim convention). :latest-slim is
          # an alias for callers that prefer the <channel>-<variant> form.
          # Per the tag-decision tree above, the floating :slim / :latest-slim
          # pointers move ONLY on main push + release.published — NOT on
          # workflow_dispatch (manual dispatch publishes only the immutable
          # :<sha>-slim tag below).
          SLIM_TAGS="-t ${REPO}:${SHA_SHORT}-slim"
          if [ "${{ github.event_name }}" = "release" ] || \
             [ "${{ github.event_name }}" = "push" ]; then
              SLIM_TAGS="${SLIM_TAGS} -t ${REPO}:slim -t ${REPO}:latest-slim"
          fi
          if [ -n "${RELEASE_TAG}" ]; then
              SLIM_TAGS="${SLIM_TAGS} -t ${REPO}:${RELEASE_TAG}-slim"
          fi

          # Full variant tags. These are the "default" pointers: a bare
          # `docker pull ghcr.io/nadicodeai/argo` resolves to :latest =
          # full variant. Backward compat with pre-issue-#2 callers that
          # pulled :latest expecting the customer-parity surface.
          # Same tag-decision-tree rule as the slim block: :latest moves ONLY
          # on main push + release.published, never on workflow_dispatch (which
          # publishes only the immutable :<sha> tag below).
          FULL_TAGS="-t ${REPO}:${SHA_SHORT}"
          if [ "${{ github.event_name }}" = "release" ] || \
             [ "${{ github.event_name }}" = "push" ]; then
              FULL_TAGS="${FULL_TAGS} -t ${REPO}:latest"
          fi
          if [ -n "${RELEASE_TAG}" ]; then
              FULL_TAGS="${FULL_TAGS} -t ${REPO}:${RELEASE_TAG}"
          fi

          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "slim_tags=${SLIM_TAGS}" >> "$GITHUB_OUTPUT"
          echo "full_tags=${FULL_TAGS}" >> "$GITHUB_OUTPUT"

      # The image's __release_date__ must equal the release tag. The native
      # install gets this for free (release.yml stamps the release-branch tree);
      # the image rebuilds from pristine upstream/ and would otherwise report
      # upstream's date (this is why the v2026.6.5 image shipped 2026.5.29). The
      # date simply IS the tag — v2026.6.5 → 2026.6.5 — but the hermetic builder
      # can't read it (.dockerignore excludes .git), so derive it here and pass
      # the one value in via --build-arg. Empty on non-release triggers → the
      # builder keeps upstream's date (build.py._stamp_release_date no-ops).
      - name: Resolve release date for image stamp
        id: stamp
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          RELEASE_DATE=""
          if [ "${{ github.event_name }}" = "release" ] && [ -n "${RELEASE_TAG}" ]; then
            RELEASE_DATE="${RELEASE_TAG#v}"
            case "${RELEASE_DATE}" in
              [0-9][0-9][0-9][0-9].*[0-9]) echo "image release date: ${RELEASE_DATE}" ;;
              *) echo "release tag ${RELEASE_TAG} is not a vYYYY.M.D calver tag" >&2; exit 1 ;;
            esac
          else
            echo "non-release trigger — image keeps upstream date"
          fi
          echo "date=${RELEASE_DATE}" >> "$GITHUB_OUTPUT"

      # ----- slim variant build + push --------------------------------
      #
      # Built first because it's the fastest of the two (~371 MB vs
      # ~4.5 GB). On failure we abort before paying the cost of the
      # full build. Multi-arch (release) goes through the same buildx
      # invocation; --push writes the manifest list directly to ghcr.
      - name: docker buildx build (runtime-slim) [push on non-PR]
        run: |
          # On pull_request: build only (verify it compiles), never publish.
          PUSH_FLAG=""
          [ "${{ github.event_name }}" != "pull_request" ] && PUSH_FLAG="--push"
          docker buildx build \
            --build-arg SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            --build-arg ARGO_RELEASE_DATE="${{ steps.stamp.outputs.date }}" \
            --platform "${{ steps.platforms.outputs.platforms }}" \
            --target runtime-slim \
            $PUSH_FLAG \
            ${{ steps.tags.outputs.slim_tags }} \
            .

      # ----- full variant build + push --------------------------------
      #
      # Adds ~10-15 min on top of slim (npm install, playwright chromium
      # fetch, s6-overlay tarballs). Multi-arch (release) doubles that
      # since QEMU-emulated arm64 is much slower than native amd64.
      - name: docker buildx build (runtime-full) [push on non-PR]
        run: |
          # On pull_request: build only (verify it compiles), never publish.
          # This is the gate that catches an image-breaking upstream sync
          # (e.g. node-pty needing make/g++) BEFORE it reaches main.
          PUSH_FLAG=""
          [ "${{ github.event_name }}" != "pull_request" ] && PUSH_FLAG="--push"
          docker buildx build \
            --build-arg SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            --build-arg ARGO_RELEASE_DATE="${{ steps.stamp.outputs.date }}" \
            --platform "${{ steps.platforms.outputs.platforms }}" \
            --target runtime-full \
            $PUSH_FLAG \
            ${{ steps.tags.outputs.full_tags }} \
            .

      # Sanity check: after a multi-arch release publish, both variants'
      # primary release pointers MUST advertise both architectures. Fails
      # loud if the build somehow produced a single-arch image under a
      # release tag.
      - name: Verify multi-arch manifest
        if: steps.platforms.outputs.multiarch == 'true'
        run: |
          RELEASE_TAG="${{ steps.tags.outputs.release_tag }}"
          docker buildx imagetools inspect "ghcr.io/nadicodeai/argo:${RELEASE_TAG}"
          docker buildx imagetools inspect "ghcr.io/nadicodeai/argo:${RELEASE_TAG}-slim"

      # Release-date gate: assert the PUBLISHED release image carries the Argo
      # release date, not upstream's. Reads argo_cli/__init__.py straight out of
      # the pushed image (via `--entrypoint cat`, so no s6 boot / banner parse)
      # and checks __release_date__ == the calver the release was cut under. This
      # is the forcing function that would have caught the v2026.6.5 image
      # shipping 2026.5.29. Runs only on release.published (where a date exists).
      - name: Verify image reports the release date (gate)
        if: github.event_name == 'release' && github.event.action == 'published'
        env:
          RELEASE_TAG: ${{ steps.tags.outputs.release_tag }}
          EXPECTED_DATE: ${{ steps.stamp.outputs.date }}
        run: |
          set -euo pipefail
          if [ -z "${EXPECTED_DATE}" ]; then
            echo "release date not resolved — the stamp step should have failed first" >&2
            exit 1
          fi
          for VARIANT in "${RELEASE_TAG}-slim" "${RELEASE_TAG}"; do
            IMG="ghcr.io/nadicodeai/argo:${VARIANT}"
            echo "checking ${IMG} for __release_date__ = \"${EXPECTED_DATE}\""
            INIT="$(docker run --rm --entrypoint cat "${IMG}" /opt/argo/argo_cli/__init__.py)"
            if echo "${INIT}" | grep -qF "__release_date__ = \"${EXPECTED_DATE}\""; then
              echo "PASS: ${VARIANT} reports the Argo release date (${EXPECTED_DATE})"
            else
              echo "FAIL: ${VARIANT} does NOT carry __release_date__ = \"${EXPECTED_DATE}\"" >&2
              echo "${INIT}" | grep -E '__version__|__release_date__' >&2 || true
              exit 1
            fi
          done
