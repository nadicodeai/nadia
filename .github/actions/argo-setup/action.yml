# argo — composite setup action (issue #7).
#
# Installs the prelude that every argo CI job needs in some subset:
#   1. uv (astral-sh/setup-uv, SHA-pinned to v5)
#   2. CPython via `uv python install <version>`
#   3. apt packages (quilt + zstd by default; extra packages opt-in)
#   4. a .venv at the repo root with pip packages from `pip-packages`
#
# All steps are opt-out via inputs so call sites stay one-liner-ish. The
# action does NOT check out the repo — callers run `actions/checkout@v4`
# first (only they know the right fetch-depth).
#
# Why a composite (not a reusable workflow): composite actions can be
# dropped into a `steps:` list without restructuring the calling job's
# `runs-on`/`needs`/`permissions`. The existing jobs only differ in their
# step list, so a composite is the minimal-surgery factoring.

name: argo setup
description: Install uv + Python + system deps + pip deps for argo CI jobs.

inputs:
  python-version:
    description: CPython version to install via uv. Set to "" to skip Python install.
    default: "3.13"
  with-uv:
    description: 'Install uv via astral-sh/setup-uv. Set "false" to skip (e.g. docker-only jobs).'
    default: "true"
  apt-packages:
    description: 'apt packages to install (space-separated). Default covers quilt + zstd for the patch/fixture pipeline. Set to "" to skip apt entirely.'
    default: "quilt zstd"
  pip-packages:
    description: 'pip packages to install into a fresh .venv at repo root (space-separated). Quote individual specs (e.g. "ruff==0.15.10"). Set to "" to skip venv creation.'
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      if: inputs.with-uv == 'true'
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

    - name: Install Python ${{ inputs.python-version }}
      if: inputs.with-uv == 'true' && inputs.python-version != ''
      shell: bash
      run: uv python install "${{ inputs.python-version }}"

    - name: Install apt packages (${{ inputs.apt-packages }})
      if: inputs.apt-packages != ''
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ inputs.apt-packages }}

    - name: Create .venv and install pip packages
      if: inputs.pip-packages != ''
      shell: bash
      run: |
        uv venv .venv
        . .venv/bin/activate
        uv pip install ${{ inputs.pip-packages }}
