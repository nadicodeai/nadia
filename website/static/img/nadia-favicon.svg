<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="NadicodeAI">
  <!-- Ink tile carrying the counterform pair: white human side, gradient agent side
       (brighter green range for contrast on ink). generate-favicons.ts squares the
       corner (rx 7 -> 0) for the full-bleed apple-touch / PWA variants. -->
  <defs>
    <linearGradient id="nc-agent-f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#007a5e"/>
      <stop offset="0.55" stop-color="#00a07a"/>
      <stop offset="1" stop-color="#00b389"/>
    </linearGradient>
  </defs>
  <rect id="tile" width="32" height="32" rx="7" fill="#171717"/>
  <g transform="translate(-7.52,-7.52) scale(0.294)">
    <path d="M 65.8 46 H 100 V 104.3 Z" fill="#ffffff"/>
    <path d="M 60 55.9 V 114 H 94.2 Z" fill="url(#nc-agent-f)"/>
  </g>
</svg>
