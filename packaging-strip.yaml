# packaging-strip.yaml — fork-owned denylist of paths removed from dist/nadia/.
#
# Applied by tools/build.py (`_strip_excluded_paths`) AFTER patches+overlay and
# BEFORE the hermes→nadia rename. Paths are repo-relative and HERMES-named
# (pre-rename), matching the assembled tree at prune time.
#
# Why a build-time prune instead of quilt patches
# -----------------------------------------------
# These removals must reach BOTH the native dist/nadia/ install (the `release`
# tree) AND the Docker image (which COPYs dist/nadia/), and MUST NOT create
# upstream-merge conflicts. A denylist over the assembled tree never conflicts
# on `make sync`: it is not a patch against upstream content. Drift is surfaced
# loudly instead of silently —
#   * a STALE entry (path no longer exists: upstream renamed/removed it) FAILS
#     the build so we re-review (mirrors packaging-overrides.yaml's live gate);
#   * a RESIDUAL China-named file surviving under gateway/platforms, tools, or
#     skills (an upstream sync ADDED a new China platform) FAILS the build so we
#     extend this list ("no leftovers" guarantee at the file level).
#
# We deliberately do NOT patch the hot wired-in files (gateway/run.py,
# gateway/config.py) to delete the now-dead enum members / elif branches: the
# China adapters are lazy-imported and never enabled (auto-enable needs
# China-only config keys a North-Italy customer never sets), so those branches
# are unreachable. Editing those volatile files every sync would cost real merge
# conflicts for zero functional gain — upstream-merge compatibility wins.
#
# Tests: China-only test files import their adapter at module top (no
# importorskip), so they must be pruned here (a pruned module would otherwise
# break collection). The handful of GENERAL gateway tests that import a China
# adapter inside a China-specific test CLASS are handled in overlay/nadia-xfail.yml
# instead (function-local import → collection still succeeds → xfail the class),
# which preserves their non-China coverage (Telegram/Discord/Matrix).

groups:
  - name: china-platforms
    why: >-
      China-market messaging platforms — Feishu/Lark (ByteDance), DingTalk
      (Alibaba), WeCom/Weixin/WeChat (Tencent), QQ (Tencent), Yuanbao
      (Tencent). Zero relevance to North-Italy SMBs; lazy-imported and never
      enabled. wecom_callback additionally parses untrusted inbound XML.
    paths:
      - gateway/platforms/feishu.py
      - gateway/platforms/feishu_comment.py
      - gateway/platforms/feishu_comment_rules.py
      - gateway/platforms/feishu_meeting_invite.py
      - gateway/platforms/dingtalk.py
      - gateway/platforms/wecom.py
      - gateway/platforms/wecom_callback.py
      - gateway/platforms/wecom_crypto.py
      - gateway/platforms/weixin.py
      - gateway/platforms/qqbot
      - gateway/platforms/yuanbao.py
      - gateway/platforms/yuanbao_media.py
      - gateway/platforms/yuanbao_proto.py
      - gateway/platforms/yuanbao_sticker.py
      # DingTalk CLI auth helper — lives in hermes_cli/, not gateway/platforms/.
      # Its only consumer (hermes_cli/gateway.py) imports it lazily inside a
      # try/except, so pruning is safe. (Was missed in the first pass because
      # the residual scan only covered gateway/platforms — now widened.)
      - hermes_cli/dingtalk_auth.py

  - name: china-companion-tools
    why: >-
      Agent tool adapters that exist only to drive the stripped China
      platforms (Feishu docs/drive, Tencent Yuanbao). Auto-discovered by the
      tools/*.py registry glob, so deleting the files cleanly removes them.
    paths:
      - tools/feishu_doc_tool.py
      - tools/feishu_drive_tool.py
      - tools/yuanbao_tools.py

  - name: china-skill
    why: "Skill bundle for the stripped Tencent Yuanbao platform."
    paths:
      - skills/yuanbao

  - name: china-tests
    why: >-
      Upstream tests dedicated to the stripped China platforms. They import the
      China adapter at module top (no importorskip), so once the module is gone
      they would error at collection — prune them with the modules they cover.
      (General gateway tests that touch a China adapter inside a China-only test
      class are xfailed in overlay/nadia-xfail.yml instead, to keep their
      Telegram/Discord/Matrix coverage.)
    paths:
      - tests/tools/test_feishu_tools.py
      - tests/gateway/feishu_helpers.py
      - tests/gateway/test_feishu.py
      - tests/gateway/test_feishu_approval_buttons.py
      - tests/gateway/test_feishu_bot_admission.py
      - tests/gateway/test_feishu_bot_auth_bypass.py
      - tests/gateway/test_feishu_comment.py
      - tests/gateway/test_feishu_comment_rules.py
      - tests/gateway/test_feishu_meeting_invite.py
      - tests/gateway/test_feishu_onboard.py
      - tests/gateway/test_setup_feishu.py
      - tests/gateway/test_dingtalk.py
      - tests/gateway/test_qqbot.py
      - tests/gateway/test_wecom.py
      - tests/gateway/test_wecom_callback.py
      - tests/gateway/test_weixin.py
      - tests/gateway/test_weixin_typing.py
      - tests/gateway/platforms/test_yuanbao_recall_db_only.py
      - tests/hermes_cli/test_dingtalk_auth.py
      - tests/test_yuanbao_integration.py
      - tests/test_yuanbao_markdown.py
      - tests/test_yuanbao_pipeline.py
      - tests/test_yuanbao_proto.py
      - tests/test_yuanbao_shutdown.py

  - name: china-docs
    why: >-
      English user-guide documentation pages for the stripped China platforms
      (and the Yuanbao skill). These ship under dist/nadia/website (→ native
      install and image), so prune them — the product must not document
      features it does not have. (The zh-Hans translations of these pages are
      removed wholesale by the zh-hans-locale group below.)
    paths:
      - website/docs/user-guide/messaging/dingtalk.md
      - website/docs/user-guide/messaging/feishu.md
      - website/docs/user-guide/messaging/qqbot.md
      - website/docs/user-guide/messaging/wecom.md
      - website/docs/user-guide/messaging/wecom-callback.md
      - website/docs/user-guide/messaging/weixin.md
      - website/docs/user-guide/messaging/yuanbao.md
      - website/docs/user-guide/skills/bundled/yuanbao

  - name: zh-hans-locale
    why: >-
      The entire Simplified-Chinese (zh-Hans) Docusaurus locale — a full
      translation of the docs (~5 MB, 335 files) that ships unused in an
      Italian-market product. The agent and the doc site use the English
      website/docs/; zh-Hans is purely the translation layer, so dropping the
      whole tree is safe. (zh-Hans is currently the only locale under
      website/i18n/.)
    paths:
      - website/i18n/zh-Hans

  - name: maintainer-docs
    why: >-
      AGENTS.md (123 hermes refs) and CONTRIBUTING.md (61) are UPSTREAM maintainer
      dev-docs describing Hermes's direct-development workflow — irrelevant to Nadia
      customers and the single biggest source of shipped hermes/nadia "mixture" in the
      artifact. The fork's OWN maintainer guide lives in the repo root (on main), not
      in dist/nadia. README (the customer doc) + LICENSE carry the MIT attribution, so
      pruning these does not weaken attribution. The README's "Workspace instructions
      — AGENTS.md" line documents the --workspace-target FEATURE (it reads a user's
      own AGENTS.md), not this repo file, so it does not dangle after the prune.
    paths:
      - AGENTS.md
      - CONTRIBUTING.md

# ---------------------------------------------------------------------------
# Inline content edits — for China references INSIDE a kept upstream file,
# where a path-prune cannot help and the fork carries no quilt patch. Applied
# by tools/build.py (`_apply_content_edits`) after the prune and before rebrand,
# on hermes-named content (anchors chosen rename-invariant). This is a
# build-time content transform (same class as the rebrand rename) — NOT a quilt
# patch; patches/ and upstream/ stay pristine. Each `find` MUST match at least
# once: a stale anchor (upstream rewrote the spot) FAILS the build loudly, so an
# edit can never silently no-op and leave the leftover behind.
# ---------------------------------------------------------------------------
content_edits:
  - name: default-display-skin-nadia
    file: cli.py
    why: >-
      Make the shipped Nadia distribution start with the generated NadicodeAI
      `nadia` skin by default. This is a fork distribution default, not an
      upstream source edit; the narrow config literal fails loud if upstream
      rewrites the default config shape.
    find: '            "skin": "default",'
    replace: '            "skin": "nadia",'
  - name: default-config-skin-nadia
    file: hermes_cli/config.py
    why: >-
      config.py owns the default config used by setup/runtime. Keep the shipped
      Nadia distribution on the generated Nadia skin by default; cli.py's copy
      is patched separately by default-display-skin-nadia.
    find: '        "skin": "default",'
    replace: '        "skin": "nadia",'
  - name: default-example-skin-nadia
    file: cli-config.yaml.example
    why: >-
      Keep the checked example config aligned with the runtime default so a
      fresh Nadia install does not document the upstream Hermes default skin as
      the product default.
    find: "  skin: default"
    replace: "  skin: nadia"
  - name: non-default-empty-banner-hero-no-hermes-fallback
    file: hermes_cli/banner.py
    why: >-
      Let the shipped Nadia skin intentionally omit custom hero art. Upstream
      falls back to the Hermes caduceus when banner_hero is empty; that is
      correct for the default Hermes skin, but wrong for a non-default Nadia
      skin profile adapted from the documented skin system.
    find: "        _bskin = get_active_skin()\n        _hero = _bskin.banner_hero if hasattr(_bskin, 'banner_hero') and _bskin.banner_hero else HERMES_CADUCEUS"
    replace: "        _bskin = get_active_skin()\n        _skin_name = getattr(_bskin, \"name\", \"default\")\n        if hasattr(_bskin, 'banner_hero') and _bskin.banner_hero:\n            _hero = _bskin.banner_hero\n        elif _skin_name == \"default\":\n            _hero = HERMES_CADUCEUS\n        else:\n            _hero = \"\""
  - name: non-default-empty-banner-logo-no-hermes-fallback
    file: hermes_cli/banner.py
    why: >-
      Let the shipped Nadia skin intentionally omit custom logo art. Upstream
      falls back to the Hermes wordmark when banner_logo is empty; the Nadia
      default should not show either Hermes art or invented Nadia ASCII art.
    find: "    if term_width >= 95:\n        _logo = _bskin.banner_logo if _bskin and hasattr(_bskin, 'banner_logo') and _bskin.banner_logo else HERMES_AGENT_LOGO\n        console.print(_logo)\n        console.print()"
    replace: "    if term_width >= 95:\n        _logo = None\n        if _bskin and hasattr(_bskin, 'banner_logo') and _bskin.banner_logo:\n            _logo = _bskin.banner_logo\n        elif not _bskin or getattr(_bskin, \"name\", \"default\") == \"default\":\n            _logo = HERMES_AGENT_LOGO\n        if _logo:\n            console.print(_logo)\n            console.print()"
  - name: nadia-banner-remove-duplicate-brand-model-suffix
    file: hermes_cli/banner.py
    why: >-
      Keep the explicit Nadia/NadicodeAI attribution line, but do not append a
      second `· NadicodeAI` label to the model line. In the skin preview this
      duplicates the model placeholder into a stray centered brand caption.
    find: '    left_lines.append(f"[{accent}]{model_short}[/]{ctx_str} [dim {dim}]·[/] [dim {dim}]NadicodeAI[/]")'
    replace: '    left_lines.append(f"[{accent}]{model_short}[/]{ctx_str}")'
  - name: nadia-banner-attribution-readable
    file: hermes_cli/banner.py
    why: >-
      Render the Nadia attribution line in the active skin body color instead of
      Rich dim gray. The line is part of the visible startup identity and must
      stay readable in dark terminal previews and real terminal sessions.
    find: '    left_lines.append(f"[dim {dim}]An AI agent from NadicodeAI (nadicode.ai) · Based on Hermes Agent by Nous Research[/]")'
    replace: '    left_lines.append(f"[{text}]An AI agent from NadicodeAI (nadicode.ai) · Based on Hermes Agent by Nous Research[/]")'
  - name: install-sh-release-shortlinks
    file: scripts/install.sh
    why: >-
      Upstream now documents the short hermes-agent.nousresearch.com install
      URLs inside the kept installer. The Nadia release tree is the only
      customer-runnable install surface, so shipped installer help must point at
      raw.githubusercontent.com/nadicodeai/nadia/release rather than the upstream
      host.
    find: "https://hermes-agent.nousresearch.com/install.sh"
    replace: "https://raw.githubusercontent.com/nadicodeai/nadia/release/scripts/install.sh"
  - name: install-sh-windows-release-shortlink
    file: scripts/install.sh
    why: >-
      The POSIX installer prints the Windows one-liner when the OS is wrong.
      Keep that recovery hint on the Nadia release branch too.
    find: "https://hermes-agent.nousresearch.com/install.ps1"
    replace: "https://raw.githubusercontent.com/nadicodeai/nadia/release/scripts/install.ps1"
  - name: install-ps1-release-shortlinks
    file: scripts/install.ps1
    why: >-
      Windows installer comments and recovery output must point at the shipped
      Nadia release-branch script, not the upstream Hermes shortlink.
